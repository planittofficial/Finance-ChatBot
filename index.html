<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceAI  Personalized Wealth Intelligence</title>
  <meta name="description"
    content="Discover your personalized financial projections powered by AI. See exactly how much you could grow your wealth and connect with certified financial advisors." />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    if (typeof Chart === 'undefined') {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';
      document.head.appendChild(s);
    }
  </script>
</head>

<body>

  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div id="app">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 2l1.2 3.9a1 1 0 0 0 .7.7L18 8l-4.1 1.4a1 1 0 0 0-.7.7L12 14l-1.2-3.9a1 1 0 0 0-.7-.7L6 8l4.1-1.4a1 1 0 0 0 .7-.7L12 2Z"
              fill="currentColor" />
            <path
              d="M6.5 13.5l.8 2.6a1 1 0 0 0 .7.7l2.6.8-2.6.8a1 1 0 0 0-.7.7l-.8 2.6-.8-2.6a1 1 0 0 0-.7-.7l-2.6-.8 2.6-.8a1 1 0 0 0 .7-.7l.8-2.6Z"
              fill="currentColor" opacity="0.8" />
          </svg>
        </div>
        <div>
          <div class="logo-text">FinanceAI</div>
          <div class="logo-sub">Wealth Intelligence</div>
        </div>
      </div>
      <div class="header-actions">
        <div id="server-status" class="live-badge" title="Backend server status">
          <span class="live-dot" id="status-dot"></span>
          <span id="status-text">Connecting</span>
        </div>
        <button id="theme-toggle" class="theme-btn" title="Toggle theme" aria-label="Toggle theme">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z"
              stroke="currentColor" stroke-width="2" />
            <path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l-1.4-1.4M20.4 20.4 19 19M19 5l1.4-1.4M3.6 20.4 5 19"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <button id="restart-btn" class="restart-btn"> Restart</button>
      </div>
    </header>

    <main class="main">

      <!-- CHAT WINDOW (shown immediately  no API gate, key is in backend .env) -->
      <section id="chat-window" class="active" aria-label="Finance AI Chat" aria-live="polite">

        <div class="progress-header" id="progress-header">
          <div class="progress-label">
            <span id="progress-label-text">Gathering your profile</span>
            <span id="progress-pct">0%</span>
          </div>
          <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="messages" id="messages" role="log">
          <div class="typing-indicator" id="typing-indicator">
            <div class="bot-avatar" aria-hidden="true">
              <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M8 10h8M9 14h6M12 3v2"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path
                  d="M7 6h10a4 4 0 0 1 4 4v3a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5v-3a4 4 0 0 1 4-4Z"
                  stroke="currentColor" stroke-width="2" />
              </svg>
            </div>
            <div class="typing-dots"><span></span><span></span><span></span></div>
          </div>
        </div>

        <div class="input-area">
          <div class="input-row">
            <input id="chat-input" class="chat-input" type="text" placeholder="Type your answer..."
              autocomplete="off" />
            <button id="send-btn" class="send-btn" disabled aria-label="Send message">
              <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M12 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>
          </div>
          <div id="chips-container" class="chips-row"></div>
          <p class="input-hint" id="input-hint"></p>
        </div>

      </section>
    </main>
  </div>

  <script>
    // 
    //  FinanceAI  Frontend Test Harness
    //  Communicates exclusively with the backend API at /api/chat
    //  No Groq key needed here  key lives in backend .env
    // 

	    // API base can be overridden when the UI is hosted separately from the backend.
	    // Examples:
	    //   http://localhost:3000                         -> default /api/chat (same origin)
	    //   http://localhost/  (frontend) + backend :3000 -> ?apiBase=http://localhost:3000/api/chat
	    // Also supported:
	    //   window.FINANCEAI_API_BASE = 'https://api.example.com/api/chat'
	    //   <meta name="financeai-api-base" content="https://api.example.com/api/chat">
	    function normalizeApiBase(v) {
	      if (!v) return v;
	      const s = String(v).trim();
	      return s.endsWith('/') ? s.slice(0, -1) : s;
	    }

	    const _apiMeta = document.querySelector('meta[name="financeai-api-base"]')?.getAttribute('content');
	    const _apiFromQuery = new URLSearchParams(window.location.search).get('apiBase');
	    const API_BASE = normalizeApiBase(_apiFromQuery || window.FINANCEAI_API_BASE || _apiMeta || '/api/chat');

    // Embed mode (used when shown inside Planitt via iframe)
    (function initEmbedMode() {
      const params = new URLSearchParams(window.location.search);
      const embed = params.get('embed');
      const isEmbedded = embed === 'planitt' || (window.self !== window.top);
      if (isEmbedded) document.documentElement.setAttribute('data-embed', 'true');

      // In embed mode we follow the host app's dark theme by default.
      // You can override via `?theme=light|dark`.
      const explicitTheme = params.get('theme');
      if (explicitTheme === 'light' || explicitTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', explicitTheme);
      }
    })();

    //  State 
    let sessionId = null;
    let currentPhase = 'collect';
    let currentStep = null;    // step metadata from backend
    let projChart = null;
    let isWaiting = false;   // true while awaiting bot response
    let analysisRendered = false; // true after analysis cards are shown once

    //  API Client 
	    async function apiPost(path, body = {}) {
	      const res = await fetch(`${API_BASE}${path}`, {
	        method: 'POST',
	        headers: { 'Content-Type': 'application/json' },
	        body: JSON.stringify(body),
	      });

	      // Guard against non-JSON responses (e.g. from a Python dev server on wrong port)
	      const contentType = res.headers.get('content-type') || '';
	      if (!contentType.includes('application/json')) {
	        let snippet = '';
	        try { snippet = (await res.text()).slice(0, 180).replace(/\s+/g, ' ').trim(); } catch (_) {}
	        const origin = `${location.protocol}//${location.host || '(no-host)'}`;
	        const hint =
	          `Non-JSON response (${res.status}) from ${origin}${API_BASE}${path}. ` +
	          `If your backend runs on a different host/port, open the UI from the backend origin or set ?apiBase=http://HOST:PORT/api/chat.`;
	        throw new Error(snippet ? `${hint} Response: ${snippet}` : hint);
	      }

	      const data = await res.json();
	      if (!res.ok) throw Object.assign(new Error(data.error || 'API error'), { status: res.status, code: data.code });
	      return data;
	    }

	    async function apiGet(path) {
	      const res = await fetch(`${API_BASE}${path}`);
	      const contentType = res.headers.get('content-type') || '';
	      if (!contentType.includes('application/json')) {
	        let snippet = '';
	        try { snippet = (await res.text()).slice(0, 180).replace(/\s+/g, ' ').trim(); } catch (_) {}
	        const origin = `${location.protocol}//${location.host || '(no-host)'}`;
	        const hint =
	          `Non-JSON response (${res.status}) from ${origin}${API_BASE}${path}. ` +
	          `If your backend runs on a different host/port, open the UI from the backend origin or set ?apiBase=http://HOST:PORT/api/chat.`;
	        throw new Error(snippet ? `${hint} Response: ${snippet}` : hint);
	      }
	      const data = await res.json();
	      if (!res.ok) throw new Error(data.error || 'API error');
	      return data;
	    }

    //  Server Status Badge 
    function setServerStatus(state) {
      // state: 'connecting' | 'connected' | 'error'
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (!dot || !text) return;
      const map = {
        connecting: { color: '#f59e0b', label: 'Connecting' },
        connected: { color: '#22c55e', label: 'Connected' },
        error: { color: '#ef4444', label: 'Server offline' },
      };
      const s = map[state] || map.connecting;
      dot.style.background = s.color;
      dot.style.boxShadow = `0 0 6px ${s.color}`;
      text.textContent = s.label;
    }
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    function formatINR(n) {
      if (!n && n !== 0) return '0';
      return new Intl.NumberFormat('en-IN').format(Math.round(n));
    }

    function formatCrLakh(n) {
      if (n >= 1e7) return `${(n / 1e7).toFixed(2)} Cr`;
      if (n >= 1e5) return `${(n / 1e5).toFixed(1)}L`;
      return `${formatINR(n)}`;
    }

    function parseMarkdown(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/_(.*?)_/g, '<em>$1</em>')
        .replace(/\n/g, '<br/>');
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function scrollToBottom() {
      const msgs = document.getElementById('messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }

    //  Progress Bar 
    function setProgress(pct, label) {
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '%';
      document.querySelector('.progress-track').setAttribute('aria-valuenow', pct);
      if (label) document.getElementById('progress-label-text').textContent = label;
    }

    //  Typing Indicator 
    function showTyping(show) {
      document.getElementById('typing-indicator').classList.toggle('active', show);
      scrollToBottom();
    }

    //  Add Messages 
    function addBotMessage(html) {
      const msgs = document.getElementById('messages');
      const typing = document.getElementById('typing-indicator');
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.innerHTML = `
        <div class="bot-avatar" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 10h8M9 14h6M12 3v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M7 6h10a4 4 0 0 1 4 4v3a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5v-3a4 4 0 0 1 4-4Z" stroke="currentColor" stroke-width="2" />
          </svg>
        </div>
        <div class="bubble">${parseMarkdown(html)}</div>`;
      msgs.insertBefore(div, typing);
      showTyping(false);
      scrollToBottom();
    }

    function addUserMessage(text) {
      const msgs = document.getElementById('messages');
      const typing = document.getElementById('typing-indicator');
      const div = document.createElement('div');
      div.className = 'msg user';
      div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
      msgs.insertBefore(div, typing);
      scrollToBottom();
    }

    function addElement(el) {
      const msgs = document.getElementById('messages');
      const typing = document.getElementById('typing-indicator');
      msgs.insertBefore(el, typing);
      scrollToBottom();
    }

    function buildLineGrowthCard(visual) {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.style.cssText = 'max-width:100%;width:100%';

      const card = document.createElement('div');
      card.className = 'growth-analysis-card';
      const chartId = `lineGrowth_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      const expected = visual.highlights?.expected_growth_10yr || 0;
      const uplift = visual.highlights?.improvement_over_current_10yr || 0;

      card.innerHTML = `
    <div style="font-family:'Outfit',sans-serif;font-weight:700;margin-bottom:0.8rem;font-size:0.95rem">
       Expected Growth Summary
    </div>
    <div class="growth-chart-wrap">
      <canvas id="${chartId}" aria-label="Expected growth line graph" role="img" style="max-height:250px"></canvas>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:1rem;font-size:0.78rem">
      <div style="padding:0.75rem;background:rgba(34,197,94,0.08);border-radius:8px;border-left:3px solid #22c55e">
        <div style="color:var(--text-muted);font-weight:600;margin-bottom:0.3rem">Expected 10Y Growth</div>
        <div style="font-weight:700;color:#22c55e;font-size:0.9rem">${formatCrLakh(expected)}</div>
      </div>
      <div style="padding:0.75rem;background:rgba(245,197,24,0.08);border-radius:8px;border-left:3px solid #f5c518">
        <div style="color:var(--text-muted);font-weight:600;margin-bottom:0.3rem">Extra vs Current Path</div>
        <div style="font-weight:700;color:#f5c518;font-size:0.9rem">${formatCrLakh(uplift)}</div>
      </div>
    </div>
  `;

      wrap.appendChild(card);

      requestAnimationFrame(() => {
        const canvas = document.getElementById(chartId);
        if (!canvas || typeof Chart === 'undefined') return;
        const labels = visual.labels || [];
        const series = Array.isArray(visual.series) ? visual.series : [];
        if (series.length < 2) return;

        const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
        const textColor = isDark ? 'rgba(240,242,250,0.6)' : 'rgba(18,21,31,0.6)';
        const gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.05)';

        new Chart(canvas, {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: series[0].name || 'Current Path',
                data: series[0].values || [],
                borderColor: '#4b5280',
                backgroundColor: 'rgba(75,82,128,0.06)',
                fill: true,
                tension: 0.35,
                borderWidth: 2,
                pointRadius: 3
              },
              {
                label: series[1].name || 'Optimized Path',
                data: series[1].values || [],
                borderColor: '#22c55e',
                backgroundColor: 'rgba(34,197,94,0.10)',
                fill: true,
                tension: 0.35,
                borderWidth: 2.5,
                pointRadius: 3
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { position: 'top', labels: { color: textColor, usePointStyle: true, font: { size: 11 } } },
              tooltip: {
                backgroundColor: 'rgba(5,7,15,0.9)',
                borderColor: 'rgba(245,197,24,0.25)',
                borderWidth: 1,
                titleColor: '#f5c518',
                bodyColor: 'rgba(240,242,250,0.8)',
                callbacks: { label: ctx => ` ${formatCrLakh(ctx.raw)}` }
              }
            },
            scales: {
              x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } } },
              y: {
                grid: { color: gridColor },
                ticks: {
                  color: textColor,
                  font: { size: 10 },
                  callback: v => v >= 1e7 ? `${(v / 1e7).toFixed(1)}Cr` : v >= 1e5 ? `${(v / 1e5).toFixed(0)}L` : `${formatINR(v)}`
                }
              }
            }
          }
        });
      });

      return wrap;
    }

    //  Enrichment UI (insight + visual + suggested questions) 
	    function buildSnapshotCard(data) {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.style.cssText = 'max-width:100%;width:100%';

      const card = document.createElement('div');
      card.className = 'snapshot-card';

      // One-line summary so it doesn't hide the bot message
      const header = document.createElement('div');
      header.className = 'snapshot-header';
      header.innerHTML = `
    <div class="snapshot-meta">${escapeHtml(data.summaryLine || '')}</div>
    <div class="snapshot-badge">LIVE</div>
  `;
      card.appendChild(header);

      // Insight + advisor hook (simple language)
      if (data.insight || data.hookLine) {
        const insight = document.createElement('div');
        insight.className = 'snapshot-insight';
        insight.innerHTML = `${escapeHtml(data.insight || '')}${data.hookLine ? `<br/><span class="snapshot-hook">${escapeHtml(data.hookLine)}</span>` : ''}`;
        card.appendChild(insight);
      }

      // Suggested questions (MAX 2, not 5)
      if (Array.isArray(data.suggestedQuestions) && data.suggestedQuestions.length) {
        const row = document.createElement('div');
        row.className = 'suggestion-row compact';
        data.suggestedQuestions.slice(0, 2).forEach(q => {
          const chip = document.createElement('button');
          chip.className = 'suggestion-chip';
          chip.type = 'button';
          chip.textContent = q;
          chip.onclick = () => sendMessage(q, q);
          row.appendChild(chip);
        });
        card.appendChild(row);
      }

	      wrap.appendChild(card);
	      return wrap;
	    }

	    // Milestone / Hook card (short micro-insight during collection)
	    function buildMilestoneCard(text) {
	      const wrap = document.createElement('div');
	      wrap.className = 'msg bot';
	      wrap.style.cssText = 'max-width:100%;width:100%';

	      const card = document.createElement('div');
	      card.className = 'snapshot-card';
	      card.style.borderColor = 'rgba(245,197,24,0.25)';

	      card.innerHTML = `
	        <div class="snapshot-header">
	          <div class="snapshot-meta">Milestone</div>
	          <div class="snapshot-badge" style="background:rgba(245,197,24,0.12);color:var(--gold-400);border:1px solid rgba(245,197,24,0.25)">INSIGHT</div>
	        </div>
		        <div class="snapshot-insight">${parseMarkdown(escapeHtml(String(text || '')))}</div>
	      `;

	      wrap.appendChild(card);
	      return wrap;
	    }

    async function maybeShowAdvisorCard(data) {
      if (!data || !data.show_advisor_card) return;
      try {
        // Try using payload first, else fetch from server
        let profile = data.profile || null;
        let analysis = data.analysis || null;
        if (!profile) {
          const state = await apiGet(`/session/${sessionId}`);
          profile = state.profile || null;
          analysis = state.analysis || analysis;
        }
        if (profile) showAdvisorCard(analysis || {}, profile);
      } catch (e) {
        // Non-fatal: advisor card is optional UI
        console.warn('[advisor-card]', e && e.message);
      }
    }

    //  Chips 
    function showChips(choices, displayMap) {
      const container = document.getElementById('chips-container');
      const input = document.getElementById('chat-input');
      const btn = document.getElementById('send-btn');
      container.innerHTML = '';
      choices.forEach(val => {
        const label = displayMap ? (displayMap[val] || val) : val;
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = label;
        chip.onclick = () => sendMessage(val, label);
        container.appendChild(chip);
      });
      input.style.display = 'none';
      btn.style.display = 'none';
    }

    function clearChips() {
      document.getElementById('chips-container').innerHTML = '';
      document.getElementById('chat-input').style.display = '';
      document.getElementById('chat-input').disabled = false;
      document.getElementById('send-btn').style.display = '';
    }

    function setHint(text) {
      document.getElementById('input-hint').textContent = text || '';
    }

    //  Apply step metadata from API 
    function applyStep(step) {
      if (!step) return;
      currentStep = step;
      const input = document.getElementById('chat-input');
      const btn = document.getElementById('send-btn');
      clearChips();

      // Reset input constraints from previous steps
      input.removeAttribute('maxlength');
      input.oninput = null;

      // Update Phase Label
      if (step.phase_label) {
        document.getElementById('progress-label-text').textContent = step.phase_label;
      }

      if (step.type === 'choice' && step.suggestions) {
        showChips(step.suggestions, step.display);
        setHint(step.hint || '');
        btn.disabled = true;
      } else if (step.type === 'choice_or_text' && step.suggestions && step.suggestions.length) {
        // Dual Mode: Show chips AND text input
        showChips(step.suggestions, step.display);
        input.style.display = ''; // Restore input
        btn.style.display = '';
        input.type = 'text';
        input.placeholder = step.hint || 'Or type your answer...';
        input.inputMode = 'text';
        input.value = '';
        input.disabled = false;
        input.focus();
        btn.disabled = false;
        setHint('');
      } else {
        // Text/Number input only
        input.style.display = '';
        btn.style.display = '';
        input.type = 'text';
        input.placeholder = step.hint || 'Type your answer...';
        input.inputMode = step.type === 'number' ? 'decimal' : 'text';
        input.value = '';
        input.disabled = false;

        // Dynamic chips if available (e.g. basic needs)
        if (step.suggestions && step.suggestions.length) {
          showChips(step.suggestions, step.display);
          input.style.display = ''; // Restore input
          btn.style.display = '';
        }

        input.focus();
        btn.disabled = false;
        setHint(step.hint || '');
      }
    }

    //  Send Message to Backend 
    async function sendMessage(raw, displayLabel) {
      if (isWaiting) return;
      const text = (raw || document.getElementById('chat-input').value).trim();
      if (!text) return;

      isWaiting = true;
      document.getElementById('chat-input').value = '';
      document.getElementById('send-btn').disabled = true;

      addUserMessage(displayLabel || text);
      clearChips();
      showTyping(true);
      await sleep(300);

      try {
        const data = await apiPost('/message', { sessionId, message: text });
        handleResponse(data);
      } catch (err) {
        showTyping(false);
        if (err.code === 'SESSION_EXPIRED') {
          addBotMessage(" Your session expired. Starting a fresh one...");
          await sleep(1000);
          await initSession();
        } else {
          addBotMessage(` ${err.message || 'Something went wrong. Please try again.'}`);
        }
        isWaiting = false;
        document.getElementById('send-btn').disabled = false;
      }
    }

    //  Handle API Response 
    function handleResponse(data) {
      showTyping(false);
      currentPhase = data.phase;
      isWaiting = false;

      // Progress update
      if (typeof data.progress === 'number') {
        const label = data.progress === 100 ? 'Analysis complete!' :
                      data.step?.phase_label || 'Gathering your profile';
        setProgress(data.progress, label);
      }

      // Checkpoint celebration
      if (data.progress >= 25 && data.progress % 25 === 0 && data.progress < 100) {
        showCelebration();
      }

      // Render Hook/Milestone card if provided
      if (data.hookMessage) {
        addElement(buildMilestoneCard(data.hookMessage));
      }

      // Main message
      if (data.message) {
        let msgHtml = data.message;
        // Append countdown badge if provided
        if (data.countdown) {
           msgHtml += `<br/><br/><span class="countdown-badge">${escapeHtml(data.countdown)}</span>`;
        }
        addBotMessage(msgHtml);
      }

      // Render Lead Capture UI (post-analysis)
      if (data.leadCapture) {
        addElement(buildLeadCaptureCard(data.leadCapture));
      }

      // Show growth line graph only when backend provides it.
      if (data.visual && data.visual.kind === 'line_growth') {
        addElement(buildLineGrowthCard(data.visual));
      }

      // Auto-show advisor card if backend requests it
      maybeShowAdvisorCard(data);

      // Apply next step (if still collecting)
      if (data.phase === 'collect' && data.step) {
        applyStep(data.step);
        return;
      }

      // Analysis arrived  render full results UI (only once)
      if (data.analysis && !analysisRendered) {
        analysisRendered = true;
        document.getElementById('progress-header').style.display = 'none';
        clearChips();
        setTimeout(() => renderAnalysis(data.analysis, data.profile), 400);
        return;
      }

      // Freeform / advisor phase  just enable input
      if (['freeform', 'hook', 'advisor'].includes(data.phase)) {
        const input = document.getElementById('chat-input');
        input.placeholder = 'Ask me anything about your finances...';
        input.disabled = false;
        document.getElementById('send-btn').disabled = false;
      }
    }

    //  Render Analysis Results 
    function renderAnalysis(a, profile) {
      const plan = a.plan || a;
      const p = plan.projections || a.projections || {};
      const totals = plan.totals || {};
      const fundMix = plan.fund_mix || {};
      const fundAmounts = plan.fund_mix_amounts || {};
      const goalProj = plan.goal_projection || {};
      const catOpt = plan.category_optimization || [];
      const expBreak = (plan.recovery_plan && plan.recovery_plan.is_optimization_applied)
        ? (plan.expense_breakdown_optimized || plan.expense_breakdown || {})
        : (plan.expense_breakdown || {});

      // 1. Expense breakdown doughnut
      addElement(buildExpenseCard(expBreak, totals, !!(plan.recovery_plan && plan.recovery_plan.is_optimization_applied)));

      // 2. MF allocation card
      setTimeout(() => addElement(buildMFCard(fundMix, fundAmounts, totals)), 400);

      // 3. Goal motivator
      setTimeout(() => addElement(buildGoalCard(goalProj)), 700);

      // 4. Projection summary
      setTimeout(() => {
        const projLines = (plan.projections || []).map(pr =>
          ` **${pr.years}Y**: ${formatINR(pr.monthly_investment)}/mo  ${pr.expected_value_formatted || formatCrLakh(pr.expected_value)}`
        ).join('\n');
        addBotMessage(
          ` **Investment Projections**\n${projLines}\n\nFor fund selection, connect with your advisor.`
        );
        setTimeout(() => addElement(buildHookCTA(a, profile)), 300);
      }, 1000);
    }

    //  Expense Breakdown Doughnut 
    function buildExpenseCard(expBreak, totals, isOptimizedView) {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.style.cssText = 'max-width:100%;width:100%';
      const chartId = `expDoughnut_${Date.now()}`;
      const monthlySalary = Number(totals?.monthly_salary || 0);
      const basicAmt = Number((expBreak.basic_needs || {}).amount || 0);
      const billsAmt = Number((expBreak.bills_payments || {}).amount || 0);
      const personalAmt = Number((expBreak.personal_spending || {}).amount || 0);
      const extraAmt = Number((expBreak.extra_unexpected || {}).amount || 0);
      const savingsAmt = Math.max(0, monthlySalary - (basicAmt + billsAmt + personalAmt + extraAmt));
      const safeSalary = monthlySalary > 0 ? monthlySalary : (basicAmt + billsAmt + personalAmt + extraAmt + savingsAmt);
      const cats = [
        { key: 'basic_needs', label: 'Basic Needs', color: '#f5c518', amount: basicAmt },
        { key: 'bills_payments', label: 'Bills & Payments', color: '#60a5fa', amount: billsAmt },
        { key: 'personal_spending', label: 'Personal Spending', color: '#f87171', amount: personalAmt },
        { key: 'extra_unexpected', label: 'Extra / Unexpected', color: '#a78bfa', amount: extraAmt },
        { key: 'savings_surplus', label: 'Savings & Investment', color: '#22c55e', amount: savingsAmt },
      ];

      const legendHTML = cats.map(c => {
        const pct = safeSalary > 0 ? Math.round((c.amount / safeSalary) * 100) : 0;
        return `<div class="expense-legend-item"><span class="legend-dot" style="background:${c.color}"></span>${c.label} (${pct}%)<span class="legend-value">${formatINR(c.amount || 0)}</span></div>`;
      }).join('');

      wrap.innerHTML = `<div class="expense-card">
    <div class="expense-card-title"> ${isOptimizedView ? 'Monthly Expense Breakdown (Post-Optimization)' : 'Monthly Expense Breakdown'}</div>
    <div class="expense-chart-row">
      <div class="expense-doughnut-wrap"><canvas id="${chartId}"></canvas></div>
      <div class="expense-legend">${legendHTML}</div>
    </div>
  </div>`;

      requestAnimationFrame(() => {
        const canvas = document.getElementById(chartId);
        if (!canvas || typeof Chart === 'undefined') return;
        new Chart(canvas, {
          type: 'doughnut',
          data: {
            labels: cats.map(c => c.label),
            datasets: [{ data: cats.map(c => c.amount || 0), backgroundColor: cats.map(c => c.color), borderWidth: 0 }]
          },
          options: { responsive: true, maintainAspectRatio: true, cutout: '62%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${formatINR(ctx.raw)}` } } } }
        });

      return wrap;
    }

      const gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.05)';

      <div class="proj-header">

        <span class="proj-badge">AI Generated</span>

          <div class="stat-label">Current Path (5yr)</div>
          <div class="stat-value count-up" data-target="${p.current_5yr}">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Optimized (5yr)</div>
          <div class="stat-value count-up" data-target="${p.optimized_5yr}" style="color:#22c55e">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Monthly SIP</div>
          <div class="stat-value" style="color:#f5c518">${formatINR(investable)}</div>
        </div>
      </div>
    </div>`;

      requestAnimationFrame(() => {
        const canvas = document.getElementById('projChart');
        if (!canvas || typeof Chart === 'undefined') return;
        if (projChart) { projChart.destroy(); projChart = null; }

        function lerp(a, b, t) { return Math.round(a + (b - a) * t); }
        const s = profile?.savings || 0;

        projChart = new Chart(canvas, {
          type: 'line',
          data: {
            labels: ['Now', '1Y', '2Y', '3Y', '4Y', '5Y'],
            datasets: [
              {
                label: 'Current Path',
                data: [s, lerp(s, p.current_3yr, 0.33), lerp(s, p.current_3yr, 0.66), p.current_3yr, lerp(p.current_3yr, p.current_5yr, 0.5), p.current_5yr],
                borderColor: '#4b5280', tension: 0.4, fill: false, pointRadius: 3, borderWidth: 2
              },
              {
                label: 'Optimized Path',
                data: [s, lerp(s, p.optimized_3yr, 0.33), lerp(s, p.optimized_3yr, 0.66), p.optimized_3yr, lerp(p.optimized_3yr, p.optimized_5yr, 0.5), p.optimized_5yr],
                borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.08)', tension: 0.4, fill: true, pointRadius: 3, borderWidth: 2.5
              },
              {
                label: 'With Advisor',
                data: [s, null, null, null, null, p.max_10yr / 2],
                borderColor: '#f5c518', backgroundColor: 'rgba(245,197,24,0.08)', tension: 0.4, fill: false, pointRadius: 3, borderWidth: 2, borderDash: [5, 5]
              }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            animation: { duration: 1200, easing: 'easeInOutQuart' },
            plugins: {
              legend: { position: 'top', labels: { color: textColor, usePointStyle: true, boxHeight: 6, font: { size: 11 } } },
              tooltip: {
                backgroundColor: 'rgba(5,7,15,0.9)',
                borderColor: 'rgba(245,197,24,0.3)', borderWidth: 1,
                titleColor: '#f5c518', bodyColor: 'rgba(240,242,250,0.8)',
                callbacks: { label: ctx => ` ${formatINR(ctx.raw)}` }
              }
            },
            scales: {
              x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 11 } } },
              y: {
                grid: { color: gridColor },
                ticks: { color: textColor, font: { size: 10 }, callback: v => v >= 1e7 ? `${(v / 1e7).toFixed(1)}Cr` : v >= 1e5 ? `${(v / 1e5).toFixed(0)}L` : `${formatINR(v)}` }
              }
            },
            interaction: { intersect: false, mode: 'index' }
          }
        });
        // Count-up animation
        wrapper.querySelectorAll('.count-up').forEach(el => {
          const target = parseInt(el.dataset.target) || 0;
          const dur = 1400; const start = performance.now();
          const tick = now => {
            const p = Math.min((now - start) / dur, 1);
            el.textContent = '' + formatINR(Math.round(target * (1 - Math.pow(1 - p, 3))));
            if (p < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        });
      });

      return wrapper;
    }

    //  Advisor Card 
    function showAdvisorCard(a, profile) {
      const goalText = String(profile?.goal || '').toLowerCase();
      const specialisations = {
        retirement: 'Retirement Planning & NPS Strategy',
        house: 'Real Estate & Home Loan Advisory', home: 'Real Estate & Home Loan Advisory',
        wealth: 'Portfolio Management & Wealth Growth',
        education: 'Education Planning & Child Investments',
        car: 'Asset Planning & Systematic Investing',
        travel: 'Goal-Based Investment Planning', australia: 'Goal-Based Investment Planning',
      };
      const riskDesc = {
        conservative: 'debt-focused and capital-protection strategies',
        moderate: 'balanced equity-debt portfolios',
        aggressive: 'high-growth equity and small-cap portfolios',
      };
      let spec = 'Comprehensive Wealth Planning';
      for (const [k, v] of Object.entries(specialisations)) { if (goalText.includes(k)) { spec = v; break; } }
      const risk = riskDesc[profile?.risk_profile] || 'diversified portfolios';
      const salary = profile?.monthly_salary || 0;
      const name = profile?.name || '';
      const goal = profile?.goal || 'wealth growth';
      const riskLabel = profile?.risk_profile || 'moderate';

      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.style.cssText = 'max-width:100%;width:100%';
      wrap.innerHTML = `
    <div class="advisor-card">
      <div class="advisor-top">
        <div class="advisor-avatar"></div>
        <div>
          <div class="advisor-name">Piyush Tembhekar</div>
          <div class="advisor-title">${spec}</div>
          <div class="advisor-creds">
            <span class="cred-badge">CFP</span>
            <span class="cred-badge">CFA</span>
            <span class="cred-badge">SEBI RIA</span>
            <span class="cred-badge">12+ Yrs</span>
          </div>
        </div>
      </div>
      <div class="advisor-divider"></div>
      <div class="advisor-spec">
        Piyush specialises in <strong>${spec.toLowerCase()}</strong> with a focus on <strong>${risk}</strong>.
        He has helped <strong>200+ clients</strong> grow wealth systematically  avg. portfolio CAGR of <strong>18.4%</strong> over 5 years.
      </div>
      <div class="advisor-cta-title">Connect Now</div>
      <div class="advisor-note" style="font-size:1rem;color:var(--text-primary);margin-top:0.25rem">Contact Number: +91 86057 27484</div>
    </div>`;

      addElement(wrap);

      setTimeout(() => {
        addBotMessage(" Piyush is available **MonSat, 10AM7PM IST**.\n\nYou can ask me any financial questions in the meantime. ");
        enableFreeChat('Ask me anything about your finances...');
      }, 600);
    }

    //  Free Chat 
    function enableFreeChat(placeholder) {
      const input = document.getElementById('chat-input');
      const btn = document.getElementById('send-btn');
      input.placeholder = placeholder || 'Ask me anything...';
      input.disabled = false;
      btn.disabled = false;
      isWaiting = false;
    }

    //  Init 
    async function initSession() {
      // Clear messages
      const msgs = document.getElementById('messages');
      const typing = document.getElementById('typing-indicator');
      Array.from(msgs.children).forEach(el => { if (el !== typing) el.remove(); });
      if (projChart) { projChart.destroy(); projChart = null; }

      document.getElementById('progress-header').style.display = '';
      document.getElementById('chat-input').disabled = true;
      document.getElementById('send-btn').disabled = true;
      setProgress(0, 'Gathering your profile');
      clearChips();
      setHint('');
      isWaiting = false;
      analysisRendered = false;
      setServerStatus('connecting');

      showTyping(true);
      await sleep(500);

      try {
        const data = await apiPost('/start', {});
        sessionId = data.sessionId;
        currentPhase = data.phase;
        setServerStatus('connected');
        showTyping(false);
        addBotMessage(data.message);
        if (data.step) applyStep(data.step);
        else {
          document.getElementById('chat-input').disabled = false;
          document.getElementById('send-btn').disabled = false;
        }
      } catch (err) {
        showTyping(false);
        setServerStatus('error');
        showConnectionError(err.message);
      }
    }

    function showConnectionError(errMsg) {
      const msgs = document.getElementById('messages');
      const typing = document.getElementById('typing-indicator');
      const origin = window.location.origin;

      const card = document.createElement('div');
      card.className = 'msg bot';
      card.style.cssText = 'max-width:100%;width:100%;';
      card.innerHTML = `
    <div style="
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.35);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
    ">
      <div style="font-size:2rem;margin-bottom:0.75rem"></div>
      <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:#f87171;margin-bottom:0.5rem">
        Cannot reach the backend server
      </div>
	      <div style="font-size:0.82rem;color:var(--text-secondary);line-height:1.6;margin-bottom:1rem">
	        The UI could not start a chat session.<br/>
	        <div style="margin-top:0.35rem">
	          API base: <strong style="color:var(--gold-400)">${escapeHtml(API_BASE)}</strong>
	        </div>
	        <div style="margin-top:0.35rem">
	          Endpoint: <strong style="color:var(--gold-400)">${origin}${API_BASE}/start</strong>
	        </div>
	      </div>
	      <div style="font-size:0.78rem;color:var(--text-muted);line-height:1.6;margin-bottom:1rem">
	        If your backend runs on a different host/port, open the UI from the backend origin or set <strong>?apiBase=http://HOST:PORT/api/chat</strong>.
	      </div>
	      <div style="font-size:0.78rem;color:var(--text-muted);line-height:1.6;margin-bottom:1rem">If this keeps happening, open DevTools → Network and check the status/response of <strong>${escapeHtml(API_BASE)}/start</strong>, then check your server logs.</div>${errMsg ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:1rem">Error: ${escapeHtml(errMsg)}</div>` : ''}
      <button onclick="initSession()" class="btn-gold" style="width:100%;padding:0.75rem">
         Retry Connection
      </button>
    </div>`;
      msgs.insertBefore(card, typing);
      scrollToBottom();
    }

    //  Event Listeners 
    document.addEventListener('DOMContentLoaded', () => {
      // Theme
      const isEmbedded = document.documentElement.getAttribute('data-embed') === 'true';
      const savedTheme = localStorage.getItem('financeai_theme') || 'dark';
      if (!document.documentElement.getAttribute('data-theme')) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }

      document.getElementById('theme-toggle').addEventListener('click', () => {
        if (isEmbedded) return; // follow host theme in embed mode
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('financeai_theme', next);
        if (projChart) {
          const isDark = next === 'dark';
          const tc = isDark ? 'rgba(240,242,250,0.6)' : 'rgba(18,21,31,0.6)';
          projChart.options.scales.x.ticks.color = tc;
          projChart.options.scales.y.ticks.color = tc;
          projChart.options.plugins.legend.labels.color = tc;
          projChart.update();
        }
      });

      // Restart
      document.getElementById('restart-btn').addEventListener('click', initSession);

      // Send
      const sendBtn = document.getElementById('send-btn');
      const chatInput = document.getElementById('chat-input');

      sendBtn.addEventListener('click', () => sendMessage());
      chatInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
      chatInput.addEventListener('input', () => {
        sendBtn.disabled = chatInput.value.trim() === '' || isWaiting;
      });

      // Start
      initSession();
    });
  </script>
</body>

</html>
